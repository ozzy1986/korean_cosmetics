<VirtualHost *:80>
    ServerName ru-atomy.ru
    ServerAlias www.ru-atomy.ru
    DocumentRoot /var/www/ru-atomy.ru
    <Directory /var/www/ru-atomy.ru>
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/ru-atomy_error.log
    CustomLog ${APACHE_LOG_DIR}/ru-atomy_access.log combined
</VirtualHost>
